version: '3.8'

services:
  db:
    image: timescale/timescaledb:latest-pg15
    container_name: inventory-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-inventory}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_pg15:/var/lib/postgresql/data

  db-backup:
    image: prodrigestivill/postgres-backup-local:15-alpine
    restart: always
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${DB_NAME:-inventory}
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-password}
      - BACKUP_NUM_KEEP=7
      - BACKUP_FREQUENCY=daily
      - SCHEDULE=@daily
    volumes:
      - ./infra/db/backups:/backups
    depends_on:
      - db

  rabbitmq:
    image: rabbitmq:3-management
    container_name: inventory-rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}

  kafka:
    image: bitnami/kafka:3.7
    container_name: inventory-kafka
    restart: always
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://host.docker.internal:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@localhost:9093
      - ALLOW_PLAINTEXT_LISTENER=yes

  app:
    build: .
    container_name: inventory-app
    restart: always
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-password}
      - DB_NAME=${DB_NAME:-inventory}
      - SHOPIFY_API_SECRET=${SHOPIFY_API_SECRET}
      - SHOPIFY_SHOP_URL=${SHOPIFY_SHOP_URL}
      - SHOPIFY_ACCESS_TOKEN=${SHOPIFY_ACCESS_TOKEN}
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672
      - KAFKA_URL=kafka:9092
      - PYTHON_SIDECAR_URL=http://python-sidecar:5000/optimize
      - DISABLE_WORKERS=true
    depends_on:
      - db
      - rabbitmq
      - kafka
      - python-sidecar

  worker:
    build: .
    container_name: inventory-worker
    restart: always
    command: ["node", "dist/worker.js"]
    environment:
      - NODE_ENV=production
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-password}
      - DB_NAME=${DB_NAME:-inventory}
      - SHOPIFY_API_SECRET=${SHOPIFY_API_SECRET}
      - SHOPIFY_SHOP_URL=${SHOPIFY_SHOP_URL}
      - SHOPIFY_ACCESS_TOKEN=${SHOPIFY_ACCESS_TOKEN}
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672
      - KAFKA_URL=kafka:9092
      - PYTHON_SIDECAR_URL=http://python-sidecar:5000/optimize
    depends_on:
      - db
      - rabbitmq
      - kafka
      - python-sidecar

  python-sidecar:
    build:
      context: ../python-sidecar
      dockerfile: Dockerfile
    ports:
      - "5005:5000"

  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: inventory-mqtt-js
    ports:
      - "1884:1883"
      - "9002:9001"
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf

volumes:
  postgres_data_pg15:
